[build]
  publish = "build"
  command = "npm run build"

# SEO: robots.txt ve sitemap önce eşleşsin, sonra SPA fallback
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
[[redirects]]
  from = "/googlec85b2de9bb7d54d0.html"
  to = "/googlec85b2de9bb7d54d0.html"
  status = 200
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
